name: flutter_paddle_ocr_example
description: "Demonstrates how to use the flutter_paddle_ocr plugin."
publish_to: 'none'

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  flutter_paddle_ocr:
    path: ../

  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  path_provider: ^2.1.4
  http: ^1.2.2
  archive: ^3.6.1

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/samples/
